name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.17.0, 22.x]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g corepack@0.35.0
          corepack enable
          corepack prepare pnpm@10.12.2 --activate

      - name: Set up Socket Firewall
        uses: socketdev/action@937f824ec476dfd164d4a4d9995751427b0be143  # v1
        with:
          mode: firewall
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}

      - name: Install dependencies
        run: sfw pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test:coverage

      - name: Build package
        run: pnpm run build

      - name: Upload coverage to Codecov
        if: matrix.node-version == '20.17.0'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de 
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20.17.0

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g corepack@0.35.0
          corepack enable
          corepack prepare pnpm@10.12.2 --activate

      - name: Set up Socket Firewall
        uses: socketdev/action@937f824ec476dfd164d4a4d9995751427b0be143  # v1
        with:
          mode: firewall
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}

      - name: Install dependencies
        run: sfw pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=critical
        continue-on-error: true

      - name: Check for dependency updates
        run: pnpm outdated
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9  # v4